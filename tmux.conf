unbind C-b
set -g prefix C-a
bind-key Space send-prefix

# True color + modern terminal flags (base16 / CLI colors)
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:hyperlinks"

# Needed to get tmux to behave
set -g default-shell "/bin/zsh"
set -g mouse on
set-option -g focus-events on

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1
# renumber windows sequentially after closing any of them
set -g renumber-windows on
# Show useful titles
set-option -g set-titles on

# Status layout (colors from base16-tmux)
set -g status-left ''
set -g status-right '#S'

set-option -s escape-time 10

# Copy mode (vi)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key P paste-buffer

# Better split bindings
bind-key '-' split-window -v
bind-key '\' split-window -h
# Resize
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5
# Clear history
bind-key k clear-history

bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# tmux 3.2+: better modifier / key chord reporting
set -g extended-keys on
# tmux 3.3+: passthrough for terminal features (e.g. OSC sequences)
set -g allow-passthrough on

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tinted-theming/base16-tmux'
set -g @colors-base16 'ashes'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# base16-ashes sets inactive borders to base00 (= bg); one style for all edges. base0D (#95aec7) reads as a tint on this theme; heavy lines are solid blocks rather than thin “dashy” rules
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#95aec7'
set -g pane-active-border-style 'fg=#95aec7'
